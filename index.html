// Firebase Configuration
const FIREBASE_URL = 'https://bagad-fun-default-rtdb.firebaseio.com';

const getLeaderboard = async () => {
    try {
        const response = await fetch(`${FIREBASE_URL}/leaderboard.json`);
        const data = await response.json();
        if (!data) return [];
        const leaderboard = Object.keys(data).map(key => ({
            id: key,
            ...data[key]
        }));
        leaderboard.sort((a, b) => b.points - a.points);
        return leaderboard;
    } catch (error) {
        console.error('Error fetching leaderboard:', error);
        return [];
    }
};

const saveToLeaderboard = async (entry) => {
    try {
        await fetch(`${FIREBASE_URL}/leaderboard.json`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entry)
        });
    } catch (error) {
        console.error('Error saving to leaderboard:', error);
    }
};

const getRandomOptions = (correct, all, count=3) => { const others = all.filter(o => o !== correct); return shuffleArray([correct, ...shuffleArray(others).slice(0,count)]); };
const generateQuiz = (n=10) => shuffleArray(audioData).slice(0,Math.min(n,audioData.length)).map(item => ({...item, bandOptions: getRandomOptions(item.band, allBands), yearOptions: getRandomOptions(item.year, allYears)}));

        <button onClick={()=>onNavigate('home')} style={{position:'absolute',top:'20px',right:'20px',background:'none',border:'none',fontSize:'1.5rem',cursor:'pointer',color:'#29b6f6'}}>×</button>
        <Header onNavigate={onNavigate}/>
        <div style={{textAlign:'center',maxWidth:'700px', marginTop:'80px'}}>
            <h1 style={{fontSize:'clamp(2rem,6vw,50px)',fontWeight:800,marginBottom:'40px',color:'#040321'}}>Prêt, {username} ?</h1>
            <p style={{color:'#666',fontSize:'20px',lineHeight:1.7,marginBottom:'16px'}}>10 extraits audio. Identifie le <u>groupe</u> et l'<u>année</u> avant que le temps ne s'écoule !</p>
            <p style={{color:'#666',fontSize:'20px',lineHeight:1.7,marginBottom:'40px'}}><strong>Score :</strong> 3 pts par groupe + 1 pt par année + jusqu'à 10 pts bonus de rapidité</p>
            <button style={styles.btnPrimary} onClick={()=>onNavigate('quiz')} onMouseOver={e=>{e.target.style.transform='scale(1.05)';}} onMouseOut={e=>{e.target.style.transform='scale(1)';}}>C'est parti !</button>
        </div>
        <div style={styles.footer}>
            <span style={styles.footerLink} onClick={()=>onNavigate('about')}>À propos</span>

const QuizPage = ({onNavigate, username}) => {
    const [quiz] = useState(()=>generateQuiz(10));
    const [cur, setCur] = useState(0);
    const [selBand, setSelBand] = useState(null);
    const [selYear, setSelYear] = useState(null);
    const [timeLeft, setTimeLeft] = useState(20);
    const [totalPts, setTotalPts] = useState(0);
    const [totalTime, setTotalTime] = useState(0);
    const [bandScore, setBandScore] = useState(0);
    const [yearScore, setYearScore] = useState(0);
    const [playing, setPlaying] = useState(false);
    const timerRef = useRef(null);
    const audioRef = useRef(null);

    useEffect(() => {
        setTimeLeft(20);
        setPlaying(false);
        
        const audio = audioRef.current;
        if (!audio) return;

        audio.currentTime = 0;
        audio.play()
            .then(() => {
                setPlaying(true);
                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            handleContinue(true);
                            return 20;
                        }
                        return prev - 1;
                    });
                    setTotalTime(prev => prev + 1);
                }, 1000);
            })
            .catch(err => console.error('Audio play error:', err));
        
        return () => {
            clearInterval(timerRef.current);
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
        };
    }, [cur]);

    const handleContinue = (timeout = false) => {
        clearInterval(timerRef.current);
        timerRef.current = null;
        
        const audio = audioRef.current;
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
        setPlaying(false);

        const q = quiz[cur];
        const bc = selBand === q.band;
        const yc = selYear === q.year;
        const pts = calculatePoints(bc, yc, timeout ? 0 : timeLeft);
        
        const newPts = totalPts + pts;
        const newBS = bandScore + (bc ? 1 : 0);
        const newYS = yearScore + (yc ? 1 : 0);
        
        setTotalPts(newPts);
        setBandScore(newBS);
        setYearScore(newYS);

        if (cur < quiz.length - 1) {
            setCur(c => c + 1);
            setSelBand(null);
            setSelYear(null);
        } else {
            saveToLeaderboard({
                username,
                points: newPts,
                bandScore: newBS,
                yearScore: newYS,
                totalTime,
                date: new Date().toISOString()
            });
            onNavigate('results', {
                points: newPts,
                bandScore: newBS,
                yearScore: newYS,
                totalTime,
                total: quiz.length,
                username
            });
        }
    };

    const q = quiz[cur];
    const canContinue = selBand && selYear;
    const progress = ((20 - timeLeft) / 20) * 100;

    const optionStyle = (selected) => ({
        padding:'10px 20px',
        borderRadius:'50px',
        border: selected ? 'none' : '1px solid #e0e0e0',
        background: selected ? '#ff8400' : '#fff',
        color: selected ? '#fff' : '#1a2744',
        fontSize:'0.9rem',
        fontWeight:600,
        cursor:'pointer',
        fontFamily:'SF Pro Rounded, sans-serif',
        transition:'all 0.2s ease'
    });

    const handleOptionHover = (e, selected) => {
        if (!selected) {
            e.target.style.background = '#ffd09d';
            e.target.style.borderColor = '#ff8400';
            e.target.style.transform = 'scale(1.02)';
        }
    };

    const handleOptionLeave = (e, selected) => {
        if (!selected) {
            e.target.style.background = '#fff';
            e.target.style.borderColor = '#e0e0e0';
            e.target.style.transform = 'scale(1)';
        }
    };

    return (
        <div style={{...styles.container, justifyContent:'flex-start', padding:'0 20px', position:'relative'}}>
            <audio ref={audioRef} src={q.file} onEnded={() => setPlaying(false)} preload="auto"/>
            
            <button onClick={() => onNavigate('home')} style={{position:'absolute', top:'20px', right:'20px', background:'none', border:'none', fontSize:'1.5rem', cursor:'pointer', color:'#ff8400'}}>×</button>
            
            <Header onNavigate={onNavigate}/>
            
            <div style={{textAlign:'center', maxWidth:'600px', width:'100%', marginTop:'40px'}}>
                <div style={{marginBottom:'20px', display:'flex', justifyContent:'center', alignItems:'center', gap:'12px'}}>
                    {playing ? (
                        <div style={{display:'flex', gap:'4px', alignItems:'center', height:'32px'}}>
                            {[1,2,3,4,5].map(i => (
                                <div key={i} style={{
                                    width:'4px',
                                    backgroundColor:'#ff8400',
                                    borderRadius:'2px',
                                    animation:`sound 0.5s ease-in-out infinite`,
                                    animationDelay:`${i * 0.1}s`,
                                    height:'16px'
                                }}/>
                            ))}
                        </div>
                    ) : (
                        <span style={{color:'#999'}}>🔇</span>
                    )}
                    <span style={{color:'#ff8400', fontSize:'0.9rem', fontWeight:600}}>
                        {playing ? '♪ Écoute attentivement...' : 'Audio terminé'}
                    </span>
                </div>

                <div style={{display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'30px', gap:'10px'}}>
                    <span style={{color: timeLeft <= 5 ? '#e74c3c' : '#ff8400', fontWeight:700, fontSize:'1.3rem', minWidth:'30px'}}>{timeLeft}</span>
                    <div style={{width:'200px', height:'6px', background:'#e0e0e0', borderRadius:'3px', overflow:'hidden'}}>
                        <div style={{
                            width:`${100 - progress}%`,
                            height:'100%',
                            background: timeLeft <= 5 ? '#e74c3c' : '#ff8400',
                            borderRadius:'3px',
                            transition:'width 1s linear'
                        }}/>
                    </div>
                </div>
                
                <h1 style={{fontSize:'clamp(1.8rem,5vw,2.5rem)', fontWeight:800, marginBottom:'30px', color:'#1a2744'}}>
                    Trouve le groupe et l'année.
                </h1>
                
                <div style={{display:'flex', flexWrap:'wrap', gap:'10px', justifyContent:'center', marginBottom:'20px'}}>
                    {q.bandOptions.map(b => (
                        <button 
                            key={b} 
                            onClick={() => setSelBand(b)} 
                            style={optionStyle(selBand === b)}
                            onMouseOver={(e) => handleOptionHover(e, selBand === b)}
                            onMouseOut={(e) => handleOptionLeave(e, selBand === b)}
                        >
                            {b}
                        </button>
                    ))}
                </div>
                
                <div style={{display:'flex', flexWrap:'wrap', gap:'10px', justifyContent:'center', marginBottom:'50px'}}>
                    {q.yearOptions.map(y => (
                        <button 
                            key={y} 
                            onClick={() => setSelYear(y)} 
                            style={optionStyle(selYear === y)}
                            onMouseOver={(e) => handleOptionHover(e, selYear === y)}
                            onMouseOut={(e) => handleOptionLeave(e, selYear === y)}
                        >
                            {y}
                        </button>
                    ))}
                </div>
                
                <button 
                    style={{...styles.btnPrimary, ...(canContinue ? {} : styles.btnDisabled)}} 
                    onClick={() => handleContinue(false)} 
                    disabled={!canContinue}
                    onMouseOver={e=>{if(canContinue){e.target.style.transform='scale(1.05)';}}}
                    onMouseOut={e=>{e.target.style.transform='scale(1)';}}
                >
                    Continue
                </button>
                
                <div style={{marginTop:'30px', color:'#999', fontSize:'0.85rem'}}>
                    Question {cur + 1} sur {quiz.length} • {totalPts} pts
                </div>
            </div>
        </div>
    );
};

const ResultsPage = ({onNavigate, data}) => {
    const canvasRef = useRef(null);
    const [imgUrl, setImgUrl] = useState(null);
    
    const pts = data?.points || 0;
    const bs = data?.bandScore || 0;
    const ys = data?.yearScore || 0;
    const total = data?.total || 10;
    const tt = data?.totalTime || 0;
    const user = data?.username || 'Player';
    
    const mins = Math.floor(tt / 60);
    const secs = tt % 60;
    const timeStr = mins > 0 ? `${mins} min ${secs} sec` : `${secs} sec`;
    
    const pct = ((bs + ys) / (total * 2)) * 100;
    const cat = pct >= 70 ? 'high' : pct >= 40 ? 'medium' : 'low';
    const msg = congratsMessages[cat][Math.floor(Math.random() * congratsMessages[cat].length)];

    useEffect(() => {
        const c = canvasRef.current;
        if (!c) return;
        
        const ctx = c.getContext('2d');
        const width = 1200;
        const height = 630;
        
        c.width = width;
        c.height = height;
        
        const bgImg = new Image();
        const logoImg = new Image();
        
        let loadedCount = 0;
        
        const checkAllLoaded = () => {
            loadedCount++;
            if (loadedCount === 2) {
                // Draw background
                ctx.drawImage(bgImg, 0, 0, width, height);
                
                // Draw logo at top center
                const logoWidth = 350;
                const logoHeight = logoWidth * (51/275);
                ctx.drawImage(logoImg, (width - logoWidth) / 2, 80, logoWidth, logoHeight);
                
                // Username
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px SF Pro Rounded, Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(user, width / 2, 220);
                
                // Score
                ctx.font = 'bold 100px SF Pro Rounded, Arial, sans-serif';
                ctx.fillText(`${pts} points`, width / 2, 340);
                
                // Quote
                ctx.font = '28px SF Pro Rounded, Arial, sans-serif';
                ctx.fillText(`"${msg}"`, width / 2, 440);
                
                // Call to action
                ctx.font = '22px SF Pro Rounded, Arial, sans-serif';
                ctx.fillText('Fais le test sur — www.bagad.fun', width / 2, 550);
                
                setImgUrl(c.toDataURL('image/png'));
            }
        };
        
        bgImg.onload = checkAllLoaded;
        logoImg.onload = checkAllLoaded;
        
        bgImg.src = BG_BASE64;
        logoImg.src = LOGO_BASE64;
        
    }, [user, pts, msg]);

    const download = async () => {
        if (!imgUrl) return;
        
        try {
            // Convert data URL to Blob
            const response = await fetch(imgUrl);
            const blob = await response.blob();
            const fileName = `bagad-${user}.png`;
            
            // Try Web Share API first (works well on mobile)
            if (navigator.share && navigator.canShare) {
                const file = new File([blob], fileName, { type: 'image/png' });
                const shareData = { files: [file] };
                
                if (navigator.canShare(shareData)) {
                    try {
                        await navigator.share(shareData);
                        return;
                    } catch (shareError) {
                        // User cancelled or share failed, fall through to download
                        if (shareError.name === 'AbortError') return;
                    }
                }
            }
            
            // Fallback: Create blob URL and download
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = fileName;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            
            // Cleanup
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            }, 100);
            
        } catch (error) {
            // Ultimate fallback for older browsers
            const a = document.createElement('a');
            a.download = `bagad-${user}.png`;
            a.href = imgUrl;
            a.click();
        }
    };

    return (
        <div style={{...styles.container, justifyContent:'flex-start', padding:'0 20px'}}>
            <canvas ref={canvasRef} style={{display:'none'}}/>
            
            <Header onNavigate={onNavigate}/>
            
            <div style={{textAlign:'center', width:'100%', maxWidth:'600px', marginTop:'70px'}}>
                {/* Results bloc */}
                <div style={{marginBottom:'30px'}}>
                    <h1 style={{fontSize:'2.5rem', fontWeight:800, marginBottom:'20px', color:'#040321'}}>
                        {pct >= 50 ? 'Congrats' : 'Nice try'}, {user}!
                    </h1>
                    
                    <div style={{display:'flex', justifyContent:'center', gap:'15px', marginBottom:'16px', flexWrap:'wrap'}}>
                        <div style={{
                            padding:'12px 28px', 
                            background:'#ffecd8',
                            borderRadius:'50px', 
                            color:'#ff8400', 
                            fontWeight:700, 
                            display:'flex', 
                            alignItems:'center', 
                            gap:'10px',
                            fontSize:'1.1rem'
                        }}>
                            <img src={TIMER_BASE64} alt="time" style={{width:'24px', height:'24px'}} />
                            {timeStr}
                        </div>
                        <div style={{
                            padding:'12px 28px', 
                            background:'#ffecd8',
                            borderRadius:'50px', 
                            color:'#ff8400', 
                            fontWeight:700, 
                            display:'flex', 
                            alignItems:'center', 
                            gap:'10px',
                            fontSize:'1.1rem'
                        }}>
                            <img src={TARGET_BASE64} alt="score" style={{width:'24px', height:'24px'}} />
                            {pts} pts
                        </div>
                    </div>

                    <div style={{color:'#999', fontSize:'0.95rem'}}>
                        Groupes: {bs}/{total} • Années: {ys}/{total}
                    </div>
                </div>
                
                {/* Share image - tilted */}
                {imgUrl && (
                    <div style={{marginBottom:'40px', marginTop:'50px'}}>
                        <img 
                            src={imgUrl} 
                            alt="Share" 
                            style={{
                                width:'405px',
                                maxWidth:'100%',
                                borderRadius:'16px',
                                boxShadow:'0 8px 30px rgba(0,0,0,0.15)',
                                transform:'rotate(-4.83deg)'
                            }}
                        />
                    </div>
                )}
                
                {/* Share text */}
                <p style={{color:'#666', fontSize:'1rem', marginBottom:'25px'}}>
                    Partage ton score et défie tes amis ! 🧡
                </p>
                
                {/* Buttons row */}
                <div style={{display:'flex', justifyContent:'center', gap:'10px', flexWrap:'wrap'}}>
                    <button 
                        style={{...styles.btnPrimary}} 
                        onClick={download}
                        onMouseOver={e=>{e.target.style.transform='scale(1.05)';}}
                        onMouseOut={e=>{e.target.style.transform='scale(1)';}}
                    >
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Télécharge ton score
                    </button>
                    <button 
                        style={{...styles.btnPrimary}} 
                        onClick={() => onNavigate('leaderboard')} 
                        onMouseOver={e=>{e.target.style.transform='scale(1.05)';}} 
                        onMouseOut={e=>{e.target.style.transform='scale(1)';}}
                    >
                        <img src={TROPHY_BASE64} alt="trophy" style={{width:'18px', height:'18px'}} />
                        Voir le classement
                    </button>
                    <button 
                        style={styles.btnSecondary} 
                        onClick={() => onNavigate('quiz')} 
                        onMouseOver={e=>{e.target.style.transform='scale(1.05)';}} 
                        onMouseOut={e=>{e.target.style.transform='scale(1)';}}
                    >
                        Joue encore
                    </button>
                </div>
            </div>
        </div>
    );
};

const LeaderboardPage = ({onNavigate}) => {
    const [lb, setLb] = useState([]);
    const [loading, setLoading] = useState(true);
    
    useEffect(() => {
        const fetchLeaderboard = async () => {
            setLoading(true);
            const data = await getLeaderboard();
            setLb(data);
            setLoading(false);
        };
        fetchLeaderboard();
    }, []);
    
    const icon = r => r === 1 ? (
        <img src={TROPHY_BASE64} alt="1st" style={{width:'28px', height:'28px'}} />
    ) : r === 2 ? '🥈' : r === 3 ? '🥉' : (
        <span style={{
            background:'#e0e0e0',
            borderRadius:'50%',
            width:'24px',
            height:'24px',
            display:'inline-flex',
            alignItems:'center',
            justifyContent:'center',
            fontSize:'0.75rem',
            fontWeight:700
        }}>{r}</span>
    );
    
    return (
        <div style={{...styles.container, padding:'0 20px', justifyContent:'flex-start'}}>
            <Header onNavigate={onNavigate}/>
            
            <div style={{maxWidth:'800px', width:'100%', margin:'0 auto', marginTop:'50px'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'30px', flexWrap:'wrap', gap:'20px'}}>
                    <h1 style={{fontSize:'2.5rem', fontWeight:800, color:'#040321'}}>Classement</h1>
                    <button style={styles.btnPrimary} onClick={() => onNavigate('login')} onMouseOver={e=>{e.target.style.transform='scale(1.05)';}} onMouseOut={e=>{e.target.style.transform='scale(1)';}}>Joue Maintenant</button>
                </div>
                
                {loading ? (
                    <div style={{textAlign:'center', padding:'60px 20px', color:'#666'}}>
                        <p style={{fontSize:'1.2rem'}}>Chargement...</p>
                    </div>
                ) : lb.length === 0 ? (
                    <div style={{textAlign:'center', padding:'60px 20px', color:'#666'}}>
                        <p style={{fontSize:'1.2rem'}}>Pas encore de scores !</p>
                    </div>
                ) : (
                    lb.map((p, i) => (
                        <div key={p.id || i} style={{display:'flex', alignItems:'center', padding:'16px 0', borderBottom:'1px solid #f0f0f0'}}>
                            <div style={{width:'40px', fontSize:'1.5rem', display:'flex', alignItems:'center', justifyContent:'center'}}>{icon(i + 1)}</div>
                            <div style={{flex:1, marginLeft:'10px'}}>
                                <div style={{fontWeight:700, color:'#1a2744', fontSize:'1.1rem'}}>{p.username}</div>
                                <div style={{color:'#999', fontSize:'0.85rem'}}>Groupes: {p.bandScore}/10 • Années: {p.yearScore}/10</div>
                            </div>
                            <div style={{fontWeight:700, color: i === 0 ? '#f5a623' : '#1a2744', fontSize:'1.1rem'}}>
                                {p.points}pts
                            </div>
                        </div>
                    ))
                )}
            </div>
            
            <div style={styles.footer}>
                <span style={styles.footerLink} onClick={() => onNavigate('about')}>À propos</span>
                <span style={{...styles.footerLink, }} onClick={() => onNavigate('leaderboard')}>Classement</span>
            </div>
        </div>
    );
};

const App = () => {
    const [page, setPage] = useState('home');
    const [data, setData] = useState(null);
    const [user, setUser] = useState(() => localStorage.getItem('bagad_user') || '');
    
    const nav = (p, d = null) => {
        setPage(p);
        setData(d);
        window.scrollTo(0, 0);
    };
    
    const login = n => {
        setUser(n);
        localStorage.setItem('bagad_user', n);
    };
    
    const render = () => {
        switch (page) {
            case 'home': return <HomePage onNavigate={nav}/>;
            case 'login': return <LoginPage onNavigate={nav} onLogin={login}/>;
            case 'about': return <AboutPage onNavigate={nav}/>;
            case 'ready': return <ReadyPage onNavigate={nav} username={user}/>;
            case 'quiz': return <QuizPage onNavigate={nav} username={user}/>;
            case 'results': return <ResultsPage onNavigate={nav} data={data}/>;
            case 'leaderboard': return <LeaderboardPage onNavigate={nav}/>;
            default: return <HomePage onNavigate={nav}/>;
        }
    };
    
    return render();
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
